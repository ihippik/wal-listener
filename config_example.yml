listener:
  serverPort: 80 # optional HTTP server for Kubernetes probes: /ready and /healthz
  slotName: myslot_1 # replication slot state is persistent; use a new slot if publication settings change
  refreshConnection: 30s # periodic refresh of replication connection
  heartbeatInterval: 10s # status updates to PostgreSQL replication stream
  filter:
    tables:
      seasons:
        - insert
        - update
  topicsMap:
    schema_table_name: "notifier" # map specific schema_table events to a custom topic
logger:
  level: info
  fmt: json # recommended for production log collection
database:
  host: localhost
  port: 5432
  name: my_db
  user: postgres
  password: postgres
  debug: false
publisher:
  type: kafka # supported: nats, kafka, rabbitmq, google_pubsub
  messageKeyFrom: some_table_field # Kafka only; useful for partitioning and idempotent consumers
  address: localhost:4222
  enable_tls: true # Kafka only
  client_cert: "cert.pem" # Kafka only
  client_key: "key.pub" # Kafka only
  ca_cert: "ca.pem" # Kafka only
  topic: "wal_listener"
  topicPrefix: ""
monitoring:
  sentryDSN: "" # optional error reporting
  promAddr: ":2112" # Prometheus metrics endpoint